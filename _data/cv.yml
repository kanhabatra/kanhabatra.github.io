    Experience:
      - company: Giocomo Lab & Linderman Lab, Stanford University
        position: Postdoctoral Fellow
        location: Stanford, CA
        url: https://giocomolab.weebly.com
        start_date: 2024-09
        end_date: present
        highlights:
          - >
            Developing biologically-grounded neural network architectures for continual learning,
            using hippocampal remapping as a computational framework for non-stationary
            representation learning.
          - >
            Applying state-space models to large-scale neural population recordings (Linderman lab
            collaboration), targeting scalable inference for latent dynamics in high-dimensional
            datasets.

      - company: Systems Neuroscience Lab, Salk Institute / UC San Diego
        position: Graduate Student Researcher
        location: La Jolla, CA
        url: https://tyelab.org
        start_date: 2019-07
        end_date: 2024-08
        highlights:
          - >
            Built an unsupervised probabilistic state-space model (HMM + GLM) to decode latent
            behavioral states from high-dimensional mPFC population recordings during social
            competition; constituted the key computational contribution to a co-first-author
            Nature (2022) paper.
          - >
            Designed a neuromodulation-inspired mixture-of-experts architecture as a meta-learning
            framework for continual multi-task learning across non-stationary environments;
            validated via deep RL benchmarks and in-vivo neuroscience experiments.
          - "Presented at Cosyne 2024 (Lisbon) and SfN 2023 (Washington DC)."

      - company: Amazon Science
        position: Applied Science Intern
        location: Seattle, WA
        url: https://www.amazon.science
        start_date: 2022-06
        end_date: 2022-09
        highlights:
          - >
            Implemented SHAP-based feature attribution (KernelSHAP, TimeSHAP) to quantify
            high-impact events in temporal classification tasks on recurrent neural networks for
            seller recruitment decisions.
          - "Pipeline operated at production scale, directly informing feature engineering strategy."

      - company: Multimodal Imaging Lab, ACTRI / UC San Diego
        position: Graduate Student Researcher
        location: La Jolla, CA
        url: https://medschool.ucsd.edu
        start_date: 2018-12
        end_date: 2020-06
        highlights:
          - >
            Developed a multi-compartment ML classifier (restriction spectrum imaging) to
            characterize and segment bone metastases in prostate cancer patients; contributed to
            publications in Scientific Reports (2022) and JMRI (2021).

    Publications:
