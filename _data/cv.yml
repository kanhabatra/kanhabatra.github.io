  summary: >
    Postdoctoral Fellow at Stanford University (Giocomo Lab & Linderman Lab).
    Ph.D. in Machine Learning & Data Science, UC San Diego (advisors: Kay Tye,
    Terrence Sejnowski). Co-first author on two Nature papers. Research spans
    continual learning, state-space models, deep reinforcement learning, and
    large-scale neural data analysis.

