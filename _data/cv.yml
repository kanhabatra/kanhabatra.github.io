    experience:
      - company: Stanford University — Giocomo Lab & Linderman Lab
        position: Postdoctoral Fellow
        start_date: 2024-09
        end_date: present
        location: Stanford, CA
        highlights:
          - Developing biologically-grounded neural network architectures for continual
            learning, using hippocampal remapping as a computational framework for
            non-stationary representation learning.
          - Applying state-space models to large-scale neural population recordings
            (Linderman lab collaboration), targeting scalable inference for latent dynamics
            in high-dimensional datasets.

      - company: Salk Institute / UC San Diego — Tye Lab
        position: Graduate Student Researcher
        start_date: 2019-07
        end_date: 2024-08
        location: La Jolla, CA
        highlights:
          - Built an unsupervised probabilistic state-space model (HMM + GLM) to decode
            latent behavioral states from high-dimensional mPFC population recordings
            during social competition; key computational contribution to co-first-author
            *Nature* (2022) paper.
          - Designed a neuromodulation-inspired mixture-of-experts architecture as a
            meta-learning framework for continual multi-task learning; validated via deep
            RL benchmarks and in-vivo experiments.
          - Presented at Cosyne 2024 (Lisbon) and SfN 2023 (Washington DC).

      - company: Amazon Science
        position: Applied Science Intern
        start_date: 2022-06
        end_date: 2022-09
        location: Seattle, WA
        highlights:
          - Implemented SHAP-based feature attribution (KernelSHAP, TimeSHAP) for temporal
            classification on RNNs; pipeline operated at production scale for seller
            recruitment decisions.

      - company: ACTRI / UC San Diego — Multimodal Imaging Lab
        position: Graduate Student Researcher
        start_date: 2018-12
        end_date: 2020-06
        location: La Jolla, CA
        highlights:
          - Developed a multi-compartment ML classifier (restriction spectrum imaging) to
            characterize bone metastases in prostate cancer patients; contributed to
            publications in *Scientific Reports* (2022) and *JMRI* (2021).

